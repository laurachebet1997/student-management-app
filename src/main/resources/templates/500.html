<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('500 - Server Error', ~{::link})}"></head>

<style>
    /* ── Error page fills the whole viewport, no sidebar ── */
    body {
        margin: 0;
        min-height: 100vh;
        background: #f0f4f8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .error-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 48px 32px;
        max-width: 520px;
        width: 100%;
    }

    /* Big animated 500 number */
    .error-code {
        font-size: clamp(80px, 18vw, 140px);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -4px;
        background: linear-gradient(135deg, #1a3a6b 0%, #2563eb 60%, #60a5fa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 4px;
        animation: pulse-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pulse-in {
        0%   { opacity: 0; transform: scale(0.7); }
        100% { opacity: 1; transform: scale(1); }
    }

    /* Icon badge */
    .error-icon-wrap {
        width: 64px;
        height: 64px;
        background: #fee2e2;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        animation: fade-up 0.5s 0.2s ease both;
    }
    .error-icon-wrap i {
        font-size: 28px;
        color: #dc2626;
    }

    .error-title {
        font-size: 22px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 10px;
        animation: fade-up 0.5s 0.3s ease both;
    }

    .error-message {
        font-size: 14px;
        color: #64748b;
        line-height: 1.7;
        margin-bottom: 32px;
        animation: fade-up 0.5s 0.4s ease both;
    }

    @keyframes fade-up {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    /* Action buttons */
    .error-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        animation: fade-up 0.5s 0.5s ease both;
    }

    .sms-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 22px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
    }
    .sms-btn:active { transform: scale(0.97); }

    .sms-btn-primary {
        background: #2563eb;
        color: #fff;
        box-shadow: 0 2px 10px rgba(37,99,235,0.28);
    }
    .sms-btn-primary:hover { background: #1d4ed8; color: #fff; }

    .sms-btn-ghost {
        background: #fff;
        color: #64748b;
        border: 1px solid #e2e8f0;
    }
    .sms-btn-ghost:hover { background: #f8fafc; color: #1e293b; }

    /* Divider line decoration */
    .error-divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #2563eb, #60a5fa);
        border-radius: 2px;
        margin: 16px auto 24px;
        animation: fade-up 0.5s 0.25s ease both;
    }

    /* Subtle card behind content */
    .error-card {
        background: #fff;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        padding: 48px 40px 40px;
        width: 100%;
        animation: fade-up 0.4s 0.1s ease both;
    }

    @media (max-width: 480px) {
        .error-card { padding: 36px 24px 32px; }
        .error-actions { flex-direction: column; align-items: stretch; }
        .sms-btn { justify-content: center; }
    }
</style>

<body>

<div class="error-shell">
    <div class="error-card">

        <!-- Big 500 -->
        <div class="error-code">500</div>

        <!-- Divider -->
        <div class="error-divider"></div>

        <!-- Icon -->
        <div class="error-icon-wrap">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <!-- Title & message -->
        <h1 class="error-title">Internal Server Error</h1>
        <p class="error-message">
            Something went wrong on our end.<br>
            Our team has been notified. Please try again in a moment.
        </p>

        <!-- Actions -->
        <div class="error-actions">
            <a th:href="@{/dashboard}" class="sms-btn sms-btn-primary">
                <i class="bi bi-house-door"></i> Back to Dashboard
            </a>
            <a href="javascript:history.back()" class="sms-btn sms-btn-ghost">
                <i class="bi bi-arrow-left"></i> Go Back
            </a>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
