<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- ── Header -->
        <div class="login-card__header">
            <div class="header-logo">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <div class="header-title">Student Management System</div>
            <div class="header-subtitle">Admin Portal</div>
        </div>

        <!-- ── Body  -->
        <div class="login-card__body">

            <p class="welcome-text">Welcome Back </p>

            <!-- Wrong credentials -->
            <div th:if="${param.error}" class="sms-alert sms-alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                Invalid username or password. Please try again.
            </div>

            <!-- Logged out successfully -->
            <div th:if="${param.logout}" class="sms-alert sms-alert-success">
                <i class="bi bi-check-circle-fill"></i>
                You have been logged out successfully.
            </div>

            <!-- Custom server message -->
            <div th:if="${message}" class="sms-alert sms-alert-danger">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${message}"></span>
            </div>

            <!--  Form -->
            <form th:action="@{/login}" method="post">
                <!--<input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/> -->

                <!-- Username -->
                <div class="field-group">
                    <label for="username" class="field-label">Username</label>
                    <div class="field-input-wrap">
                        <i class="bi bi-person field-icon"></i>
                        <input type="text"
                               id="username"
                               name="username"
                               class="field-input"
                               placeholder="Enter your username"
                               required
                               autofocus/>
                    </div>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <label for="password" class="field-label">Password</label>
                    <div class="field-input-wrap">
                        <i class="bi bi-lock field-icon"></i>
                        <input type="password"
                               id="password"
                               name="password"
                               class="field-input"
                               placeholder="Enter your password"
                               required/>
                        <button type="button" class="pw-toggle" id="pwToggle"
                                tabindex="-1" aria-label="Toggle password visibility">
                            <i class="bi bi-eye" id="pwToggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember me + Forgot -->
                <div class="form-extras">
                    <label class="remember-label">
                        <input type="checkbox" name="remember-me"/> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <!-- Submit -->
                <button type="submit" class="login-btn">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>

            </form>

            <p class="login-footer-note">
                &copy; 2026 Student Management System. All rights reserved.
            </p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Password show / hide toggle
    const pwInput  = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const pwIcon   = document.getElementById('pwToggleIcon');

    pwToggle?.addEventListener('click', () => {
        const hidden   = pwInput.type === 'password';
        pwInput.type   = hidden ? 'text' : 'password';
        pwIcon.className = hidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    });
</script>

</body>
</html>
