<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Courses', ~{::link})}">
    <link th:href="@{/css/courseCSS/courses.css}" rel="stylesheet">
</head>

<body>
<!-- Topbar -->
<header th:replace="~{fragments/layout :: topbar}"></header>
<div class="d-flex" id="wrapper">

    <!-- ── Sidebar -->
    <div th:replace="~{fragments/layout :: sidebar('courses')}"></div>

    <div  id="page-content-wrapper">
    <!-- ── Main Area  -->
    <div class="main-area">
        <!-- Page Content -->
        <main class="page-content">

            <!-- ── Page Header  -->
            <div class="sms-page-header">
                <h1 class="sms-page-title">Course Records</h1>
                <a th:href="@{/course/new}" class="sms-btn sms-btn-primary">
                    <i class="bi bi-plus-lg"></i> Add New Course
                </a>
            </div>

            <!-- ── Success Alert  -->
            <div th:if="${message}"
                 class="sms-alert sms-alert-success"
                 th:text="${message}"></div>

            <!-- ── Main Content  -->
            <div class="courses-grid">

                <!--
                     DATA TABLE PANE -->
                <section class="sms-card table-panel">

                    <!-- Toolbar -->
                    <div class="table-toolbar">
                        <span class="table-label">Data Table</span>
                        <div class="toolbar-right">
                            <button class="sms-btn sms-btn-ghost" id="filtersBtn">
                                <i class="bi bi-funnel"></i> Filters
                                <i class="bi bi-chevron-down" style="font-size:11px;"></i>
                            </button>
                            <div class="toolbar-search">
                                <i class="bi bi-search"></i>
                                <input type="text"
                                       id="tableSearchInput"
                                       placeholder="Search"
                                       autocomplete="off"/>
                            </div>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${courses.content.isEmpty()}" class="empty-state">
                        <i class="bi bi-book"></i>
                        <p>No courses found.</p>
                        <a th:href="@{/course/new}" class="sms-btn sms-btn-primary">Add First Course</a>
                    </div>

                    <!-- Table -->
                    <div class="table-responsive-wrap" th:if="${!courses.content.isEmpty()}">
                        <table class="sms-table" id="coursesTable">
                            <thead>
                            <tr>
                                <th style="width:40px;">
                                    <input type="checkbox" class="sms-checkbox" id="selectAll" title="Select all"/>
                                </th>
                                <th>Course ID</th>
                                <th>Course Name</th>
                                <th>Course Code</th>
                                <th>Fees</th>
                                <th>Duration</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="course : ${courses.content}" class="course-row">

                                <!-- Checkbox -->
                                <td>
                                    <input type="checkbox" class="sms-checkbox row-check"/>
                                </td>

                                <!-- Course ID -->
                                <td>
                                    <span class="student-id"
                                          th:text="${course.id}"></span>
                                </td>

                                <!-- Course Name + icon avatar -->
                                <td>
                                    <div class="name-cell">
                                        <div class="course-avatar">
                                            <i class="bi bi-book-half"></i>
                                        </div>
                                        <span class="student-fullname"
                                              th:text="${course.courseName}">Computer Science</span>
                                    </div>
                                </td>

                                <!-- Course Code -->
                                <td>
                                    <span class="code-badge" th:text="${course.courseCode}">CS101</span>
                                </td>

                                <!-- Fees -->
                                <td>
                                    <span class="cell-text"
                                          th:text="${'KES ' + #numbers.formatDecimal(course.fee, 1, 'COMMA', 2, 'POINT')}">KES 3,999.00</span>
                                </td>

                                <!-- Duration -->
                                <td>
                                    <div class="duration-cell">
                                        <i class="bi bi-clock" style="font-size:12px; color:var(--text-muted);"></i>
                                        <span class="cell-text" th:text="${course.duration}">4 Months</span>
                                    </div>
                                </td>

                                <!-- Actions -->
                                <td>
                                    <div class="action-buttons">
                                        <!-- View -->
                                        <a th:href="@{'/course/' + ${course.id}}"
                                           class="action-btn action-btn-view"
                                           title="View Course">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <!-- Edit -->
                                        <a th:href="@{/course/{id}/edit(id=${course.id})}"
                                           class="action-btn action-btn-edit"
                                           title="Edit Course">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <!-- Delete -->
                                        <form th:action="@{/course/delete//{id}(id=${course.id})}"
                                              method="post"
                                              style="display:inline;"
                                              onsubmit="return confirm('Delete this course?');">
                                            <input type="hidden"
                                                   th:name="${_csrf.parameterName}"
                                                   th:value="${_csrf.token}"/>
                                            <button type="submit"
                                                    class="action-btn action-btn-delete"
                                                    title="Delete Course">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- ── Pagination Footer  -->
                    <div class="table-footer" th:if="${!courses.content.isEmpty()}">
                        <span class="total-label">
                            Total Courses: <strong th:text="${courses.totalElements}">0</strong>
                        </span>

                        <nav aria-label="Courses pagination" th:if="${courses.totalPages > 1}">
                            <ul class="sms-pagination">

                                <!-- Previous -->
                                <li th:classappend="${courses.first} ? 'disabled'">
                                    <a class="page-btn"
                                       th:href="@{/course/list(page=${courses.number > 0 ? courses.number - 1 : 0}, size=${courses.size})}">
                                        <i class="bi bi-chevron-left"></i>
                                    </a>
                                </li>

                                <!-- Page numbers -->
                                <li th:each="pageNum : ${#numbers.sequence(0, courses.totalPages - 1)}"
                                    th:classappend="${pageNum == courses.number} ? 'active'">
                                    <a class="page-btn"
                                       th:href="@{/course/list(page=${pageNum}, size=${courses.size})}"
                                       th:text="${pageNum + 1}">1</a>
                                </li>

                                <!-- Next -->
                                <li th:classappend="${courses.last} ? 'disabled'">
                                    <a class="page-btn"
                                       th:href="@{/course/list(page=${courses.last ? courses.number : courses.number + 1}, size=${courses.size})}">
                                        <i class="bi bi-chevron-right"></i>
                                    </a>
                                </li>

                            </ul>
                        </nav>
                    </div>

                </section>
                <!-- end .table-panel -->

            </div>
            <!-- end .courses-grid -->

        </main>



    </div>
    <!-- end .main-area -->
    </div>

</div>
<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- Scripts -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<!-- ── Page-level styles ──────────────────────────────────── -->


<!-- ── Page-level scripts ──────────────────────────────────── -->
<script>
    // Select-all checkbox
    document.getElementById('selectAll')?.addEventListener('change', function () {
        document.querySelectorAll('.row-check').forEach(cb => cb.checked = this.checked);
    });

    // Live table search
    document.getElementById('tableSearchInput')?.addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('#coursesTable tbody tr.course-row').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });
</script>

</body>
</html>
