<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Edit Course', ~{::link})}">
  <link th:href="@{/css/courseCSS/edit-course.css}" rel="stylesheet">
</head>

<body>
<header th:replace="~{fragments/layout :: topbar}"></header>
<div class="d-flex" id="wrapper">
  <div th:replace="~{fragments/layout :: sidebar('courses')}"></div>
  <div id = "page-content-wrapper" >

  <div class="main-area">
    <div class="sms-page-header">
      <div>
        <h1 class="sms-page-title">Update Course</h1>
        <p class="sms-page-sub">Edit the course details below and save your changes.</p>
      </div>
      <a th:href="@{/course/list}" class="sms-btn sms-btn-ghost">
        <i class="bi bi-arrow-left"></i> Back to List
      </a>
    </div>
    <main class="page-content">

      <div class="sms-card form-card">

        <div class="form-card__header">
          <div class="form-card__header-icon form-card__header-icon--yellow">
            <i class="bi bi-pencil-fill"></i>
          </div>
          <span>Course Details</span>
          <span class="status-chip"
                th:classappend="${courseDto.active} ? ' status-chip--active' : ' status-chip--inactive'"
                th:text="${courseDto.active} ? 'Active' : 'Inactive'">Active</span>
        </div>

        <div class="form-card__body">
          <form th:action="@{/course/{id}/update(id=${courseDto.id})}"
                th:object="${courseDto}"
                method="post"
                novalidate>

            <div class="form-row">
              <div class="field-group">
                <label for="courseName" class="field-label">Course Name <span class="required-star">*</span></label>
                <div class="field-input-wrap">
                  <i class="bi bi-book field-icon"></i>
                  <input type="text" id="courseName" th:field="*{courseName}"
                         class="field-input"
                         th:classappend="${#fields.hasErrors('courseName')} ? ' field-input--error'"
                         placeholder="e.g. Web Development" required/>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('courseName')}" th:errors="*{courseName}"></span>
              </div>
              <div class="field-group">
                <label for="courseCode" class="field-label">Course Code <span class="required-star">*</span></label>
                <div class="field-input-wrap">
                  <i class="bi bi-hash field-icon"></i>
                  <input type="text" id="courseCode" th:field="*{courseCode}"
                         class="field-input"
                         th:classappend="${#fields.hasErrors('courseCode')} ? ' field-input--error'"
                         placeholder="e.g. WEB101" required/>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('courseCode')}" th:errors="*{courseCode}"></span>
              </div>
            </div>

            <div class="form-row">
              <div class="field-group">
                <label for="duration" class="field-label">Duration <span class="required-star">*</span></label>
                <div class="field-input-wrap">
                  <i class="bi bi-clock field-icon"></i>
                  <input type="text" id="duration" th:field="*{duration}"
                         class="field-input"
                         th:classappend="${#fields.hasErrors('duration')} ? ' field-input--error'"
                         placeholder="e.g. 6 Months" required/>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></span>
              </div>
              <div class="field-group">
                <label for="fee" class="field-label">Course Fee (KES) <span class="required-star">*</span></label>
                <div class="field-input-wrap">
                  <i class="bi bi-currency-exchange field-icon"></i>
                  <input type="number" step="0.01" min="0" id="fee" th:field="*{fee}"
                         class="field-input"
                         th:classappend="${#fields.hasErrors('fee')} ? ' field-input--error'"
                         placeholder="e.g. 1200" required/>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('fee')}" th:errors="*{fee}"></span>
              </div>
            </div>

            <div class="form-row">
              <div class="field-group">
                <label for="isActive" class="field-label">Course Status</label>
                <div class="field-input-wrap field-select-wrap">
                  <i class="bi bi-toggle-on field-icon"></i>
                  <select id="isActive" th:field="*{active}" class="field-input field-select">
                    <option th:value="true">Active</option>
                    <option th:value="false">Inactive</option>
                  </select>
                  <i class="bi bi-chevron-down select-chevron"></i>
                </div>
              </div>
              <div></div>
            </div>

            <div class="field-group field-group--full">
              <label for="description" class="field-label">Description</label>
              <div class="field-input-wrap">
                <i class="bi bi-text-paragraph field-icon field-icon--top"></i>
                <textarea id="description" th:field="*{description}"
                          class="field-input field-textarea"
                          th:classappend="${#fields.hasErrors('description')} ? ' field-input--error'"
                          rows="4" placeholder="Enter course description..."></textarea>
              </div>
              <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </div>

            <div class="form-actions">
              <button type="reset" class="sms-btn sms-btn-ghost">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
              <button type="submit" class="sms-btn sms-btn-warning">
                <i class="bi bi-save"></i> Update Course
              </button>
            </div>

          </form>
        </div>
      </div>

    </main>



  </div>
  </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
