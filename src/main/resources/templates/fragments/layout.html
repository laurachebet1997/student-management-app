<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(pageTitle, links)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' | SMS'">Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/layout.css}" rel="stylesheet">
    <th:block th:replace="${links} ?: ~{}"></th:block>
</head>
<body>

<!-- TOPBAR FRAGMENT -->
<header th:fragment="topbar" class="topbar">

    <!-- Left: hamburger + title -->
    <div class="topbar__left">
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <span class="topbar__title"></span>
    </div>

    <!-- Center: Search -->
    <div class="topbar__search">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search..." id="globalSearch" autocomplete="off"/>
    </div>

    <!-- Right: icons + profile -->
    <div class="topbar__right">
        <!-- Admin Profile -->
        <div class="admin-profile dropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <div class="admin-avatar">
                <i class="bi bi-person-fill"></i>
                 <!-- <img th:src="@{/images/profile}" alt="Admin"/> -->

            </div>
            <div class="admin-info">
                <span class="admin-name"> <span th:text="${adminName}"></span></span>
                <span class="admin-email"><span th:text="${adminName}"></span>@admin.ac.ke</span>
            </div>
            <i class="bi bi-chevron-down chevron"></i>
        </div>

        <!-- Profile dropdown menu -->
        <ul class="dropdown-menu dropdown-menu-end" style="font-size:13px; min-width:160px;">
            <li><a class="dropdown-item" th:href="@{/students/profile}"><i class="bi bi-person me-2"></i>Profile</a></li>
            <li><a class="dropdown-item" th:href="@{/settings}"><i class="bi bi-gear me-2"></i>Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <form method="post" th:action="@{/logout}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="dropdown-item text-danger">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                </form>
            </li>
        </ul>

    </div>
</header>

<div class="app-layout" >
    <!--   SIDEBAR FRAGMENT  -->
    <div th:fragment="sidebar(activePage)" class="sidebar" id="appSidebar">

        <!-- Logo -->
        <div class="sidebar__logo">
            <div class="sidebar__logo-icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <div class="sidebar__logo-text">
                <span class="brand-main">Student</span>
                <span class="brand-sub">Management System</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="sidebar__nav">
            <a th:href="@{/dashboard}"
               th:classappend="${activePage == 'dashboard'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a th:href="@{/students/list}"
               th:classappend="${activePage == 'students'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-people"></i> Students
            </a>

            <a th:href="@{/course/list}"
               th:classappend="${activePage == 'courses'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-book"></i> Courses
            </a>

            <a th:href="@{/enrollments/enrollmentList}"
               th:classappend="${activePage == 'enrollments'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-check2-square"></i> Enrollments
            </a>

            <a th:href="@{/enrollments/showEnroll}"
               th:classappend="${activePage == 'enroll'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-person-plus"></i> Enroll to Course
            </a>

           <!-- <span class="nav-section-label" style="margin-top:8px;">Reports</span> -->
            <a th:href="@{/report}"
               th:classappend="${activePage == 'reports'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-bar-chart-line"></i> Reports
            </a>
        </nav>

        <!-- Bottom links -->
        <div class="sidebar__bottom">
            <a th:href="@{/settings}"
               th:classappend="${activePage == 'settings'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-gear"></i> Settings
            </a>
            <a th:href="@{/help}"
               th:classappend="${activePage == 'help'} ? ' active'"
               class="sidebar-link">
                <i class="bi bi-question-circle"></i> Help
            </a>
            <form method="post" th:action="@{/logout}" class="sidebar-logout-form">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit" class="sidebar-logout-btn">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay">
     </div>
</div>






<!-- FOOTER FRAGMENT -->
<footer th:fragment="footer" class="app-footer" id="footer-align">
    <span>Copyright &copy; Student Management System 2026</span>
</footer>


<!-- SCRIPTS FRAGMENT -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {

            // ── Sidebar mobile toggle ──
            const toggle   = document.getElementById('sidebarToggle');
            const sidebar  = document.getElementById('appSidebar');
            const overlay  = document.getElementById('sidebarOverlay');

            function openSidebar()  { sidebar?.classList.add('open');  overlay?.classList.add('open'); }
            function closeSidebar() { sidebar?.classList.remove('open'); overlay?.classList.remove('open'); }

            toggle?.addEventListener('click', () => {
                sidebar?.classList.contains('open') ? closeSidebar() : openSidebar();
            });
            overlay?.addEventListener('click', closeSidebar);

            // ── Global search (client-side highlight helper) ──
            // Each page can listen to 'sms:search' event with the query string
             const searchInput = document.getElementById('globalSearch');
            document.addEventListener('sms:search', (e) => {
                const query = e.detail.query;
                const rows = document.querySelectorAll('table tbody tr');

                rows.forEach(row => {
                    const rowText = row.textContent.toLowerCase();
                    row.style.display = rowText.includes(query) ? "" : "none";
                });
            });

            //      searchInput?.addEventListener('input', () => {
        //          document.dispatchEvent(new CustomEvent('sms:search', {
        //              detail: { query: searchInput.value.toLowerCase() }
        //          }));
        //      });
         });

    </script>
</th:block>

</body>
</html>
