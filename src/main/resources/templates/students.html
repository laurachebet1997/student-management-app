<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Students', ~{::link})}">
  <link th:href="@{/css/studentCSS/students.css}" rel="stylesheet">
</head>

<body>
<!-- Topbar -->
<header th:replace="~{fragments/layout :: topbar}"></header>
<div class="d-flex" id="wrapper">
  <!-- ── Sidebar  -->
  <div th:replace="~{fragments/layout :: sidebar('students')}"></div>
  <div id="page-content-wrapper" >
  <!-- ── Main Area  -->
    <div class="main-area">
      <!-- ── Page Header -->
      <div class="sms-page-header">
        <h1 class="sms-page-title">Student Records</h1>
        <a th:href="@{/students/new}" class="sms-btn sms-btn-primary">
          <i class="bi bi-plus-lg"></i> Add New Student
        </a>
      </div>
      <!-- Page Content -->
      <main class="page-content">


        <!-- ── Success / Error Alerts -->
        <div th:if="${message}"
             class="sms-alert sms-alert-success"
             th:text="${message}"></div>

        <!-- ── Main Content Grid  -->
        <div class="students-grid">

          <!-- DATA TABLE PANEL-->
          <section class="sms-card table-panel">

            <!-- Toolbar -->
            <div class="table-toolbar">
              <span class="table-label">Data Table</span>
              <div class="toolbar-right">
                <!--<button class="sms-btn sms-btn-ghost" id="filtersBtn">
                  <i class="bi bi-funnel"></i> Filters
                  <i class="bi bi-chevron-down" style="font-size:11px;"></i>
                </button> -->
                <div class="toolbar-search">
                  <i class="bi bi-search"></i>
                  <input type="text"
                         id="tableSearchInput"
                         placeholder="Search"
                         autocomplete="off"/>
                </div>
              </div>
            </div>

            <!-- Empty State -->
            <div th:if="${students.content.isEmpty()}" class="empty-state">
              <i class="bi bi-people"></i>
              <p>No students found.</p>
              <a th:href="@{/students/new}" class="sms-btn sms-btn-primary">Add First Student</a>
            </div>

            <!-- Table -->
            <div class="table-responsive-wrap" th:if="${!students.content.isEmpty()}">
              <table class="sms-table" id="studentsTable">
                <thead>
                <tr>
                  <th style="width:40px;">
                    <input type="checkbox" class="sms-checkbox" id="selectAll"
                           title="Select all"/>
                  </th>
                  <th>Student ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="student : ${students.content}" class="student-row">

                  <!-- Checkbox -->
                  <td>
                    <input type="checkbox" class="sms-checkbox row-check"/>
                  </td>

                  <!-- Student ID -->
                  <td>
                                      <!-- <span class="student-id" th:text="${'S' + #strings.leftPad('' + student.id, 3, '0')}">S001</span> -->
                    <span class="student-id"
                          th:text="${student.id}"></span>
                  </td>

                  <!-- Name + Avatar -->
                  <td>
                    <div class="name-cell">
                      <div class="student-avatar"
                           th:text="${#strings.toUpperCase(#strings.substring(student.firstName,0,1)
                                                         + #strings.substring(student.lastName,0,1))}">St
                      </div>
                      <span class="student-fullname"
                            th:text="|${student.firstName} ${student.lastName}|">student</span>
                    </div>
                  </td>

                  <!-- Email -->
                  <td>
                    <span class="cell-text" th:text="${student.email}">a@student.com</span>
                  </td>

                  <!-- Phone -->
                  <td>
                    <span class="cell-text" th:text="${student.phoneNumber}">+254700000000</span>
                  </td>

                  <!-- Status -->
                  <td>
                                      <span class="status-badge"
                              th:classappend="${student.active} ? ' status-active' : ' status-inactive'"
                              th:text="${student.active} ? 'Active' : 'Inactive'">Active</span>
                  </td>

                  <!-- Actions -->
                  <td>
                    <div class="action-buttons">
                      <!-- View -->
                      <a th:href="@{/students/{id}(id=${student.id})}"
                         class="action-btn action-btn-view"
                         title="View Student">
                        <i class="bi bi-eye"></i>
                      </a>
                      <!-- Edit -->
                      <a th:href="@{/students/{id}/edit(id=${student.id})}"
                         class="action-btn action-btn-edit"
                         title="Edit Student">
                        <i class="bi bi-pencil"></i>
                      </a>
                      <!-- Delete -->
                      <form th:action="@{/students/delete/{id}(id=${student.id})}"
                            method="post"
                            style="display:inline;"
                            onsubmit="return confirm('Delete this student?');">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button type="submit"
                                class="action-btn action-btn-delete"
                                title="Delete Student">
                          <i class="bi bi-trash"></i>
                        </button>
                      </form>
                    </div>
                  </td>

                </tr>
                </tbody>
              </table>
            </div>

            <!-- ── Pagination Footer ──────────────── -->
            <div class="table-footer" th:if="${!students.content.isEmpty()}">
                          <span class="total-label">
                              Total Students: <strong th:text="${students.totalElements}">0</strong>
                          </span>

              <nav aria-label="Students pagination">
                <ul class="sms-pagination">

                  <!-- Previous -->
                  <li th:classappend="${students.first} ? 'disabled'">
                    <a th:href="@{/students/list(page=${students.first ? 0 : students.number - 1}, size=${students.size})}"
                       class="page-btn">
                      <i class="bi bi-chevron-left"></i>
                    </a>
                  </li>

                  <!-- Page numbers -->
                  <li th:each="pageNum : ${#numbers.sequence(0, students.totalPages - 1)}"
                      th:classappend="${pageNum == students.number} ? 'active'">
                    <a class="page-btn"
                       th:href="@{/students/list(page=${pageNum}, size=${students.size})}"
                       th:text="${pageNum + 1}">1</a>
                  </li>

                  <!-- Next -->
                  <li th:classappend="${students.last} ? 'disabled'">
                    <a th:href="@{/students/list(page=${students.last ? students.number : students.number + 1}, size=${students.size})}"
                       class="page-btn">
                      <i class="bi bi-chevron-right"></i>
                    </a>
                  </li>

                </ul>
              </nav>
            </div>

          </section>
          <!-- end .table-panel -->

        </div>
        <!-- end .students-grid -->

      </main>

    </div>
  <!-- end .main-area -->
  </div>

</div>

<!-- Footer -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- Scripts -->
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<!-- ── Page-level scripts ──────────────────────────────────── -->
<script>
  // Select-all checkbox
  document.getElementById('selectAll')?.addEventListener('change', function () {
    document.querySelectorAll('.row-check').forEach(cb => cb.checked = this.checked);
  });

  // Live table search (filters visible rows client-side)
  // document.getElementById('tableSearchInput')?.addEventListener('input', function () {
  //   const q = this.value.toLowerCase().trim();
  //   document.querySelectorAll('#studentsTable tbody tr.student-row').forEach(row => {
  //     row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  //   });
  // });

  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('tableSearchInput');
    const tableBody = document.querySelector('table tbody');
    const rows = tableBody.getElementsByTagName('tr');

    searchInput.addEventListener('keyup', function() {
      const filter = searchInput.value.toLowerCase();

      // Loop through all table rows
      for (let i = 0; i < rows.length; i++) {

        const emailCell = rows[i].getElementsByTagName('td')[3];
        //const courseCell = rows[i].getElementsByTagName('td')[3];

        if (emailCell) {
          const emailText = emailCell.textContent || emailCell.innerText;
          //const courseText = courseCell.textContent || courseCell.innerText;

          // Check if the search term exists in either column
          if (emailText.toLowerCase().indexOf(filter) ){
            rows[i].style.display = ""; // Show row
          } else {
            rows[i].style.display = "none"; // Hide row
          }
        }
      }
    });
  });
</script>

</body>
</html>
