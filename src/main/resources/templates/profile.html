<script th:inline="javascript">
    // ── Generate avatar initials from rendered name ──────
    // const nameEl   = document.querySelector('.profile-display-name');

    //     avatarEl.textContent = initials;
    // }

    // ── Session login time ────────────────────────────────
    const loginTime = new Date();
    document.getElementById('loginTime').textContent =
        loginTime.toLocaleString('en-KE', {
            weekday:'short', year:'numeric', month:'short',
            day:'numeric', hour:'2-digit', minute:'2-digit'
        });

    // ── Live session duration ─────────────────────────────
    function updateSessionTime() {
        const diff = Math.floor((Date.now() - loginTime.getTime()) / 1000);
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        document.getElementById('sessionTime').textContent =
            h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`;
    }
    updateSessionTime();
    setInterval(updateSessionTime, 1000);

    // ── Browser info ──────────────────────────────────────
    const ua = navigator.userAgent;
    let browser = 'Unknown Browser';
    if (ua.includes('Edg'))    browser = 'Microsoft Edge';
    else if (ua.includes('Chrome'))  browser = 'Google Chrome';
    else if (ua.includes('Firefox')) browser = 'Mozilla Firefox';
    else if (ua.includes('Safari'))  browser = 'Apple Safari';
    document.getElementById('browserInfo').textContent = browser;
</script>
