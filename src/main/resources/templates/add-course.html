<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Add New Course', ~{::link})}">
    <link th:href="@{/css/courseCSS/add-course.css}" rel="stylesheet">
</head>

<body>
<header th:replace="~{fragments/layout :: topbar}"></header>
<div class="d-flex" id="wrapper">
    <!-- ── Sidebar  -->
    <div th:replace="~{fragments/layout :: sidebar('courses')}"></div>

    <div id="page-content-wrapper">
    <!-- ── Main Area -->
    <div class="main-area">
        <!--  Page Header  -->
        <div class="sms-page-header">
            <div>
                <h1 class="sms-page-title">Add New Course</h1>
                <p class="sms-page-sub"></p>
            </div>
            <a th:href="@{/course/list}" class="sms-btn sms-btn-ghost">
                <i class="bi bi-arrow-left"></i> Back to List
            </a>
        </div>
        <main class="page-content">
            <!--  Form Card  -->
            <div class="sms-card form-card">
                <div class="form-card__header">
                    <div class="form-card__header-icon">
                        <i class="bi bi-plus-circle-fill"></i>
                    </div>
                    <span>Course Details</span>
                </div>

                <div class="form-card__body">
                    <form th:action="@{/course}" th:object="${courseDto}" method="post" novalidate>

                        <!-- Row 1: Course Name + Course Code -->
                        <div class="form-row">

                            <div class="field-group">
                                <label for="courseName" class="field-label">
                                    Course Name <span class="required-star">*</span>
                                </label>
                                <div class="field-input-wrap">
                                    <i class="bi bi-book field-icon"></i>
                                    <input type="text"
                                           th:field="*{courseName}"
                                           id="courseName"
                                           class="field-input"
                                           th:classappend="${#fields.hasErrors('courseName')} ? ' field-input--error'"
                                           placeholder="e.g. Web Development"
                                           required/>
                                </div>
                                <span class="field-error"
                                      th:if="${#fields.hasErrors('courseName')}"
                                      th:errors="*{courseName}"></span>
                            </div>

                            <div class="field-group">
                                <label for="courseCode" class="field-label">
                                    Course Code <span class="required-star">*</span>
                                </label>
                                <div class="field-input-wrap">
                                    <i class="bi bi-hash field-icon"></i>
                                    <input type="text"
                                           th:field="*{courseCode}"
                                           id="courseCode"
                                           class="field-input"
                                           th:classappend="${#fields.hasErrors('courseCode')} ? ' field-input--error'"
                                           placeholder="e.g. WEB101"
                                           required/>
                                </div>
                                <span class="field-error"
                                      th:if="${#fields.hasErrors('courseCode')}"
                                      th:errors="*{courseCode}"></span>
                            </div>

                        </div>

                        <!-- Row 2: Duration + Course Fee -->
                        <div class="form-row">

                            <div class="field-group">
                                <label for="duration" class="field-label">
                                    Duration <span class="required-star">*</span>
                                </label>
                                <div class="field-input-wrap">
                                    <i class="bi bi-clock field-icon"></i>
                                    <input type="text"
                                           th:field="*{duration}"
                                           id="duration"
                                           class="field-input"
                                           th:classappend="${#fields.hasErrors('duration')} ? ' field-input--error'"
                                           placeholder="e.g. 6 Months"
                                           required/>
                                </div>
                                <span class="field-error"
                                      th:if="${#fields.hasErrors('duration')}"
                                      th:errors="*{duration}"></span>
                            </div>

                            <div class="field-group">
                                <label for="fee" class="field-label">
                                    Course Fee (KES) <span class="required-star">*</span>
                                </label>
                                <div class="field-input-wrap">
                                    <i class="bi bi-currency-exchange field-icon"></i>
                                    <input type="number"
                                           step="0.01"
                                           min="0"
                                           th:field="*{fee}"
                                           id="fee"
                                           class="field-input"
                                           th:classappend="${#fields.hasErrors('fee')} ? ' field-input--error'"
                                           placeholder="e.g. 1200"
                                           required/>
                                </div>
                                <span class="field-error"
                                      th:if="${#fields.hasErrors('fee')}"
                                      th:errors="*{fee}"></span>
                            </div>

                            <div class="field-group">
                                <label for="courseCF" class="field-label">
                                    CF <span class="required-star">*</span>
                                </label>
                                <div class="field-input-wrap">
                                    <i class="bi bi-archive-fill"></i>
                                    <input type="number"
                                           step="0.01"
                                           min="1"
                                           th:field="*{courseCF}"
                                           id="courseCF"
                                           class="field-input"
                                           th:classappend="${#fields.hasErrors('courseCF')} ? ' field-input--error'"
                                           placeholder="e.g. 1-3"
                                           required/>
                                </div>
                                <span class="field-error"
                                      th:if="${#fields.hasErrors('courseCF')}"
                                      th:errors="*{courseCF}"></span>
                            </div>

                        </div>

                        <!-- Row 3: Description (full width) -->
                        <div class="field-group field-group--full">
                            <label for="description" class="field-label">Description</label>
                            <div class="field-input-wrap field-textarea-wrap">
                                <i class="bi bi-text-paragraph field-icon field-icon--top"></i>
                                <textarea th:field="*{description}"
                                          id="description"
                                          class="field-input field-textarea"
                                          th:classappend="${#fields.hasErrors('description')} ? ' field-input--error'"
                                          rows="4"
                                          placeholder="Enter course description..."></textarea>
                            </div>
                            <span class="field-error"
                                  th:if="${#fields.hasErrors('description')}"
                                  th:errors="*{description}"></span>
                        </div>

                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="reset" class="sms-btn sms-btn-ghost">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </button>
                            <button type="submit" class="sms-btn sms-btn-primary">
                                <i class="bi bi-save"></i> Save Course
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </main>
    </div>
    </div>
</div>
    <footer th:replace="~{fragments/layout :: footer}"></footer>


<th:block th:replace="~{fragments/layout :: scripts}"></th:block>



</body>
</html>
