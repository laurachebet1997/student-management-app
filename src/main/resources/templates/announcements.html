<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Announcements', ~{::link})}">
    <link th:href="@{/css/rashCSS/announcement.css}" rel="stylesheet">
</head>

<body>
<header th:replace="~{fragments/layout :: topbar}"></header>
<div class="d-flex" id="wrapper">
    <div th:replace="~{fragments/layout :: sidebar('announcements')}"></div>

    <div id="page-content-wrapper" >
    <div class="main-area">
        <div class="sms-page-header">
            <div>
                <h1 class="sms-page-title">Announcements</h1>
                <p class="sms-page-sub">System-wide communications and notices for students.</p>
            </div>
            <button class="sms-btn sms-btn-primary" disabled title="Coming soon">
                <i class="bi bi-plus-lg"></i> New Announcement
            </button>
        </div>

        <main class="page-content">
            <div class="sms-card empty-page-card">
                <div class="empty-page-inner">
                    <div class="empty-icon-wrap empty-icon--orange">
                        <i class="bi bi-megaphone"></i>
                    </div>
                    <h2 class="empty-title">No Announcements Yet</h2>
                    <p class="empty-desc">
                        There are currently no announcements to display.<br>
                        When announcements are created, they will appear here.
                    </p>

                </div>
            </div>

        </main>
    </div>

    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
